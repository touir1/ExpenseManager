stages:
  - build
  - test
  - quality
  - security

variables:
  SONAR_HOST_URL: "http://sonarqube:9000"
  BASE_DIR_PATH: frontend/dashboard

default:
  before_script:
    - cd $BASE_DIR_PATH

# ----------------------
# BUILD
# ----------------------
build:
  stage: build
  image: node:20
  cache:
    paths:
      - $BASE_DIR_PATH/.npm
  script:
    - npm config set cache .npm --location=project
    - npm ci
    - npm run build
  artifacts:
    when: always
    paths:
      - $BASE_DIR_PATH/dist
      - $BASE_DIR_PATH/node_modules

# ----------------------
# TEST + COVERAGE
# ----------------------
test:
  stage: test
  image: node:20
  cache:
    paths:
      - $BASE_DIR_PATH/.npm
  script:
    - npm config set cache .npm --location=project
    - npm ci
    - npm test
  artifacts:
    when: always
    paths:
      - $BASE_DIR_PATH/coverage

# ----------------------
# SONARQUBE ANALYSIS
# ----------------------
sonarqube:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  dependencies:
    - build
    - test
  script:
    - sonar-scanner -Dsonar.projectVersion="$CI_COMMIT_SHA" -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.login="$SONAR_TOKEN"

# ----------------------
# SCA – DEPENDENCY CHECK
# ----------------------
sca:
  stage: security
  image: 
    name: owasp/dependency-check:latest
    entrypoint: [""]
  cache:
    key: dependency-check-data
    paths:
      - $BASE_DIR_PATH/dependency-check-data/
  dependencies:
    - build
  script:
    - mkdir -p dependency-check-data
    - export PATH="$PATH:/usr/share/dependency-check/bin"
    - dependency-check.sh --project "ExpenseManager-Frontend-Dashboard" --scan . --format JSON --data dependency-check-data --out dependency-check-report --nvdApiKey "$NVD_API_KEY" --ossIndexUsername "$OSSINDEX_USER" --ossIndexPassword "$OSSINDEX_TOKEN" --failOnCVSS 7 || SCAN_FAILED=$?
    - |
      echo ""
      echo "========================================="
      echo "   VULNERABILITY SCAN SUMMARY"
      echo "========================================="
      if [ -f dependency-check-report/dependency-check-report.json ]; then
        apk add --no-cache jq 2>/dev/null || true
        
        CRITICAL=$(jq -r '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3.baseSeverity == "CRITICAL")] | length' dependency-check-report/dependency-check-report.json 2>/dev/null || echo "0")
        HIGH=$(jq -r '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3.baseSeverity == "HIGH")] | length' dependency-check-report/dependency-check-report.json 2>/dev/null || echo "0")
        MEDIUM=$(jq -r '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3.baseSeverity == "MEDIUM")] | length' dependency-check-report/dependency-check-report.json 2>/dev/null || echo "0")
        LOW=$(jq -r '[.dependencies[]?.vulnerabilities[]? | select(.cvssv3.baseSeverity == "LOW")] | length' dependency-check-report/dependency-check-report.json 2>/dev/null || echo "0")
        
        echo "🔴 CRITICAL: $CRITICAL"
        echo "🟠 HIGH:     $HIGH"
        echo "🟡 MEDIUM:   $MEDIUM"
        echo "🟢 LOW:      $LOW"
        echo "========================================="
        
        if [ "$CRITICAL" != "0" ] || [ "$HIGH" != "0" ]; then
          echo ""
          echo "📋 VULNERABILITY DETAILS:"
          echo ""
          jq -r '.dependencies[]? | select(.vulnerabilities != null) | .fileName as $file | .vulnerabilities[]? | "[\(.cvssv3.baseSeverity // .severity)] \(.name) - \($file)\n  > \(.description[0:150])...\n"' dependency-check-report/dependency-check-report.json 2>/dev/null || echo "Unable to parse vulnerability details"
        fi
      else
        echo "⚠️  No report generated"
      fi
      echo "========================================="
      if [ -n "$SCAN_FAILED" ]; then
        exit $SCAN_FAILED
      fi
  artifacts:
    when: always
    paths:
      - $BASE_DIR_PATH/dependency-check-report/
      - $BASE_DIR_PATH/node_modules/

# ----------------------
# SAST – SEMGREP
# ----------------------
sast:
  stage: security
  image: returntocorp/semgrep
  script:
    - ln -sf "$PWD" /src
    - semgrep scan --config=p/javascript --json --metrics=off --output semgrep.json --verbose .
  artifacts:
    when: always
    paths:
      - $BASE_DIR_PATH/semgrep.json

# ----------------------
# SECRETS SCAN – GITLEAKS
# ----------------------
secrets-scan:
  stage: security
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --no-git -c ../../.gitleaks.toml --report-format json --report-path gitleaks.json --verbose --platform gitlab
  artifacts:
    when: always
    paths:
      - $BASE_DIR_PATH/gitleaks.json
