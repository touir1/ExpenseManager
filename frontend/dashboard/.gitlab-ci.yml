# GitLab CI configuration for the Dashboard frontend module

include:
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-init.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-stages.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-build.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-test.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-quality.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-security.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-deploy.yml'

variables:
  BASE_DIR_PATH: frontend/dashboard
  PROJECT_KEY: expenses-manager-frontend-dashboard

# ----------------------
# cache configuration
# ----------------------

.build-node-modules-cache: &build-node-modules-cache
  key: "$PROJECT_KEY-deps"
  paths:
    - $BASE_DIR_PATH/.npm
    - $BASE_DIR_PATH/node_modules

.dependency-check-cache: &dependency-check-cache
  key: dependency-check-data
  paths:
    - $BASE_DIR_PATH/dependency-check-data/

# ----------------------
# BUILD
# ----------------------

build-dev:
  extends: .node-build
  variables:
    VITE_API_BASE: "https://localhost"
  cache:
    <<: *build-node-modules-cache

# ----------------------
# TEST + COVERAGE
# ----------------------

test:
  extends: .node-test
  cache:
    <<: *build-node-modules-cache

# ----------------------
# SONARQUBE ANALYSIS
# ----------------------

sonarqube:
  extends: .node-sonarqube
  variables:
    SONAR_PROJECT_KEY: "touir:expense-manager:frontend:dashboard"
  dependencies:
    - build-dev
    - test

# ----------------------
# SCA – DEPENDENCY CHECK
# ----------------------

sca:
  extends: .sca
  variables:
    OWASP_PROJECT_NAME: "ExpenseManager-Frontend-Dashboard"
  cache:
    - *dependency-check-cache
    - *build-node-modules-cache
  dependencies:
    - build-dev

# ----------------------
# SAST – SEMGREP
# ----------------------

sast:
  extends: .sast

# ----------------------
# SECRETS SCAN – GITLEAKS
# ----------------------

secrets-scan:
  extends: .secrets-scan

# ----------------------
# DEPLOYMENT
# ----------------------

deploy-dev:
  extends: .deploy-web-dev
  dependencies:
    - build-dev
  variables:
    ZIP_NAME_PREFIX: "expenses-manager-web-dashboard"


