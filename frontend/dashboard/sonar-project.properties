# Source and test directories
sonar.sources=src
sonar.tests=src

# Test file patterns
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclude test files and config from code quality analysis
sonar.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.config.ts,**/*.config.js,**/*.d.ts,**/main.tsx,**/App.tsx,**/setupTests.ts

# Exclude test files and config from coverage calculations
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.config.ts,**/*.config.js,**/*.d.ts,**/main.tsx,**/App.tsx,**/setupTests.ts

# Coverage report path
sonar.javascript.lcov.reportPaths=coverage/lcov.info
