# SonarQube configuration for the Mobile frontend module

# project identification
sonar.projectKey=touir:expense-manager:frontend:mobile
sonar.projectName=Expense Manager - Frontend - Mobile

# Source and test directories
sonar.sources=src
sonar.tests=src

# Test file patterns
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclude test files and config from code quality analysis
sonar.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.config.ts,**/*.config.js,**/*.d.ts,**/main.tsx,**/App.tsx,**/test-setup.ts,**/types/*.ts,**/types/**,**/constants/**,**/i18n/index.ts,**/i18n/locales/**,**/scripts/**

# Exclude test files and config from coverage calculations
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.config.ts,**/*.config.js,**/*.d.ts,**/main.tsx,**/App.tsx,**/test-setup.ts,**/types/*.ts,**/types/**,**/constants/**,**/i18n/index.ts,**/i18n/locales/**,**/scripts/**

# Coverage report path
sonar.javascript.lcov.reportPaths=coverage/lcov.info
