# GitLab CI configuration for the Mobile frontend module (Ionic + Capacitor)

include:
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-init.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-stages.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-build.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-test.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-quality.yml'
  - local: 'infrastructure/configs/gitlab-ci-templates/ci-security.yml'

variables:
  BASE_DIR_PATH: frontend/mobile
  PROJECT_KEY: expenses-manager-frontend-mobile

# ----------------------
# cache configuration
# ----------------------

.build-node-modules-cache: &build-node-modules-cache
  key: "$PROJECT_KEY-deps"
  paths:
    - $BASE_DIR_PATH/.npm
    - $BASE_DIR_PATH/node_modules

.dependency-check-cache: &dependency-check-cache
  key: "$PROJECT_KEY-dependency-check-data"
  paths:
    - $BASE_DIR_PATH/dependency-check-data/

# ----------------------
# BUILD
# ----------------------

build-dev:
  extends: .node-build
  variables:
    VITE_API_BASE_URL: "https://localhost"
  cache:
    <<: *build-node-modules-cache

# ----------------------
# TEST + COVERAGE
# ----------------------

test:
  extends: .node-test
  cache:
    <<: *build-node-modules-cache

# ----------------------
# SONARQUBE ANALYSIS
# ----------------------

sonarqube:
  extends: .node-sonarqube
  variables:
    SONAR_PROJECT_KEY: "touir:expense-manager:frontend:mobile"
  allow_failure: true
  dependencies:
    - build-dev
    - test

# ----------------------
# SCA – DEPENDENCY CHECK
# ----------------------

sca:
  extends: .sca
  variables:
    OWASP_PROJECT_NAME: "ExpenseManager-Frontend-Mobile"
  allow_failure: true
  cache:
    - *dependency-check-cache
    - *build-node-modules-cache
  dependencies:
    - build-dev

# ----------------------
# SAST – SEMGREP
# ----------------------

sast:
  extends: .sast
  allow_failure: true

# ----------------------
# SECRETS SCAN – GITLEAKS
# ----------------------

secrets-scan:
  extends: .secrets-scan

# NOTE: APK/AAB build (build:android / build:android-aab) requires JDK 21 +
# Android SDK and is not included in CI. Run locally via npm run build:android.
