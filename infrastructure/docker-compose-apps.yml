networks:
  expenses_manager_apps_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.100.0.0/24

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    entrypoint: [ 'nginx', '-g', 'daemon off;' ]
    ports:
      - "80:80"
      - "443:443"
    networks:
      - expenses_manager_apps_net
    volumes:
      - ./configs/nginx:/etc/nginx
      - ./volumes/nginx/logs:/var/log/nginx
      - ./volumes/nginx/www:/usr/share/nginx/html
  
  users-service:
    image: localhost:5050/expenses-manager/expensemanager/expense-manager-backend-users:latest
    container_name: users-service
    ports:
      - "9100:9100"
    networks:
      - expenses_manager_apps_net
