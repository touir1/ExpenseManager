# GitLab CI configuration for the Test stage

.node-test:
  stage: test
  image: node:20
  script:
    - npm config set cache .npm --location=project
    - npm ci
    - npm test
  artifacts:
    when: always
    paths:
      - $BASE_DIR_PATH/coverage

.dotnet-test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  variables:
    NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"
  cache:
    key: "nuget-$CI_PROJECT_ID"
    paths:
      - .nuget/packages/
  script:
    - dotnet test --collect:"XPlat Code Coverage" --results-directory "./coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
  artifacts:
    when: always
    paths:
      - $BASE_DIR_PATH/coverage